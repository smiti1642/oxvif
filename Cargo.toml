[package]
name = "oxvif"
version = "0.7.3"
edition = "2024"
rust-version = "1.85"
description = "Async Rust client library for the ONVIF IP camera protocol"
license = "MIT"
keywords = ["onvif", "camera", "rtsp", "soap", "ip-camera"]
categories = ["network-programming", "multimedia"]
repository = "https://github.com/smiti1642/oxvif"
homepage = "https://github.com/smiti1642/oxvif"
documentation = "https://docs.rs/oxvif"
readme = "README.md"
exclude = [".env", ".env.example"]

[dependencies]
quick-xml   = "0.39"
sha1        = "0.11"
base64      = "0.22"
rand        = "0.10"
reqwest     = { version = "0.13", default-features = false, features = ["rustls", "rustls-native-certs"] }
tokio       = { version = "1", features = ["rt", "rt-multi-thread", "macros", "net", "time"] }
thiserror   = "2"
async-trait = "0.1"

[dev-dependencies]
mockito = "1"
dotenvy = "0.15"
tokio   = { version = "1", features = ["rt-multi-thread", "macros"] }
axum    = "0.8"
