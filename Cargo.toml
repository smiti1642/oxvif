[package]
name = "oxvif"
version = "0.1.0"
edition = "2024"
description = "Async Rust client library for the ONVIF IP camera protocol"
license = "MIT"
keywords = ["onvif", "camera", "rtsp", "soap", "ip-camera"]
categories = ["network-programming", "multimedia"]

[dependencies]
quick-xml  = "0.36"
sha1       = "0.10"
base64     = "0.22"
rand       = "0.8"
reqwest    = { version = "0.12", default-features = false, features = ["rustls-tls"] }
tokio      = { version = "1", features = ["rt", "rt-multi-thread", "macros", "net", "time"] }
thiserror  = "2"
async-trait = "0.1"
dotenvy = "0.15"

[dev-dependencies]
mockito = "1"
